<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XAU / USDT AI Signal Platform</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#02152f,#0a2e63);
color:white;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.title{
text-align:center;
font-size:36px;
color:#FFD700;
margin-bottom:25px;
}

.topbar{
display:flex;
justify-content:space-between;
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:10px;
margin-bottom:25px;
}

.price{
font-size:20px;
color:#4fc3f7;
}

.prob{
font-size:18px;
color:#00ff9c;
}

.card{
background:rgba(255,255,255,0.05);
border-radius:15px;
padding:20px;
margin-bottom:20px;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

.accordion{
cursor:pointer;
padding:18px;
width:100%;
border:none;
text-align:left;
font-size:20px;
color:#4fc3f7;
background:none;
transition:0.3s;
}

.accordion:hover{
color:#FFD700;
}

.panel{
max-height:0;
overflow:hidden;
transition:max-height 0.4s ease;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th{
background:rgba(255,215,0,0.15);
padding:12px;
}

td{
padding:12px;
text-align:center;
}

.buy{
color:#00ff9c;
font-weight:bold;
animation:pulse 1s infinite;
}

.sell{
color:#ff3b3b;
font-weight:bold;
animation:pulse 1s infinite;
}

.wait{
color:#9ca3af;
}

@keyframes pulse{
0%{opacity:0.6}
50%{opacity:1}
100%{opacity:0.6}
}

.chart{
margin-top:20px;
}

.footer{
text-align:center;
margin-top:30px;
color:#aaa;
font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<div class="title">
⚡ XAU / USDT AI SIGNAL PLATFORM
</div>

<div class="topbar">

<div class="price">
Gold Price: <span id="price">Loading...</span>
</div>

<div class="prob">
AI Signal Strength: 78%
</div>

</div>

<div class="card">

<button class="accordion">Trend Strategy</button>

<div class="panel">

<table>

<tr>
<th>Timeframe</th>
<th>Signal</th>
</tr>

<tr>
<td>M5</td>
<td class="buy">BUY</td>
</tr>

<tr>
<td>M15</td>
<td class="wait">WAIT</td>
</tr>

<tr>
<td>H1</td>
<td class="sell">SELL</td>
</tr>

</table>

</div>

<button class="accordion">Scalping Strategy</button>

<div class="panel">

<table>

<tr>
<th>Timeframe</th>
<th>Signal</th>
</tr>

<tr>
<td>M1</td>
<td class="buy">BUY</td>
</tr>

<tr>
<td>M5</td>
<td class="wait">WAIT</td>
</tr>

</table>

</div>

<button class="accordion">Smart Money Strategy</button>

<div class="panel">

<table>

<tr>
<th>Timeframe</th>
<th>Signal</th>
</tr>

<tr>
<td>M15</td>
<td class="sell">SELL</td>
</tr>

<tr>
<td>H1</td>
<td class="wait">WAIT</td>
</tr>

<tr>
<td>H4</td>
<td class="buy">BUY</td>
</tr>

</table>

</div>

</div>

<div class="card">

<h2>📈 Live Gold Market</h2>

<div class="chart">

<iframe
src="https://s.tradingview.com/widgetembed/?symbol=OANDA:XAUUSD&interval=15&theme=dark"
width="100%"
height="500"
frameborder="0">
</iframe>

</div>

</div>

<div class="footer">
AI Analysis • Auto Update • XAU/USDT Trading Signals
</div>

</div>

<script>

var acc=document.getElementsByClassName("accordion");

for(var i=0;i<acc.length;i++){

acc[i].addEventListener("click",function(){

this.classList.toggle("active");

var panel=this.nextElementSibling;

if(panel.style.maxHeight){
panel.style.maxHeight=null;
}else{
panel.style.maxHeight=panel.scrollHeight+"px";
}

});

}

fetch("https://api.gold-api.com/price/XAU")

.then(res=>res.json())

.then(data=>{
document.getElementById("price").innerText=data.price+" USD";
})

.catch(()=>{
document.getElementById("price").innerText="Unavailable";
});

</script>

</body>
</html>
