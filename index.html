<script>

function applySignal(el,signal){

el.innerText = signal

el.className = ""

if(signal=="BUY") el.classList.add("buy")
else if(signal=="SELL") el.classList.add("sell")
else el.classList.add("wait")

}


async function loadSignals(){

try{

let r = await fetch("/signals")
let d = await r.json()

applySignal(document.getElementById("trend_m5"), d.signals.ema)
applySignal(document.getElementById("trend_m15"), d.signals.ema)
applySignal(document.getElementById("trend_h1"), d.signals.ema)

applySignal(document.getElementById("scalp_m1"), d.signals.rsi)
applySignal(document.getElementById("scalp_m5"), d.signals.rsi)

applySignal(document.getElementById("sm_m15"), d.signals.macd)
applySignal(document.getElementById("sm_h1"), d.signals.macd)
applySignal(document.getElementById("sm_h4"), d.signals.macd)

document.getElementById("ai").innerText = d.accuracy.ai
document.getElementById("prediction").innerText = d.signals.ai

}catch{

console.log("Signal API error")

}

}



async function updatePrice(){

try{

let r = await fetch("https://api.gold-api.com/price/XAU")
let d = await r.json()

document.getElementById("price").innerText = d.price + " USD"

}catch{

document.getElementById("price").innerText = "API Error"

}

}


loadSignals()
updatePrice()

setInterval(loadSignals,60000)
setInterval(updatePrice,10000)

</script>
