<script>

// ❌ randomSignal O‘CHIRILDI

function applySignal(el,signal){
el.innerText=signal;
el.className="";
if(signal=="BUY") el.classList.add("buy");
else if(signal=="SELL") el.classList.add("sell");
else el.classList.add("wait");
}

// ✅ YANGI updateSignals (API orqali)
async function updateSignals(){

  let res = await fetch("/signal")
  let data = await res.json()

  applySignal(document.getElementById("trend_m5"), data.trend_m5)
  applySignal(document.getElementById("trend_m15"), data.trend_m15)
  applySignal(document.getElementById("trend_h1"), data.trend_h1)

  applySignal(document.getElementById("scalp_m1"), data.scalp_m1)
  applySignal(document.getElementById("scalp_m5"), data.scalp_m5)

  applySignal(document.getElementById("sm_m15"), data.sm_m15)
  applySignal(document.getElementById("sm_h1"), data.sm_h1)
  applySignal(document.getElementById("sm_h4"), data.sm_h4)

  document.getElementById("ai").innerText = data.ai

  if(data.ai > 70)
    document.getElementById("prediction").innerHTML = "<span class='buy'>Strong BUY</span>"
  else if(data.ai < 30)
    document.getElementById("prediction").innerHTML = "<span class='sell'>Strong SELL</span>"
  else
    document.getElementById("prediction").innerHTML = "<span class='wait'>Neutral</span>"
}

// GOLD API
async function updatePrice(){
try{
let r=await fetch("https://api.gold-api.com/price/XAU");
let d=await r.json();
price.innerText=d.price+" USD";
}catch{
price.innerText="API Error";
}
}

// CRYPTO
let marketOpen = false;

function toggleMarket(){
const box = document.getElementById("marketBox");

if(!box) return;

if(marketOpen){
box.style.maxHeight = "0px";
} else {
box.style.maxHeight = "500px";
}

marketOpen = !marketOpen;
}

async function loadCrypto(){
try{
const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,binancecoin,solana,the-open-network&vs_currencies=usd");
const data = await res.json();

btc.innerText="$"+data.bitcoin.usd;
eth.innerText="$"+data.ethereum.usd;
bnb.innerText="$"+data.binancecoin.usd;
sol.innerText="$"+data.solana.usd;
ton.innerText="$"+data["the-open-network"].usd;

}catch(e){
console.log("Crypto API error:", e);
}
}

// RUN
updateSignals();
updatePrice();
loadCrypto();

setInterval(updateSignals,10000);
setInterval(updatePrice,10000);
setInterval(loadCrypto,10000);

</script>
