<!DOCTYPE html>
<html>
<head>

<title>BTC SIGNAL ENGINE</title>

<style>

body{
background:#060c1b;
font-family:Arial;
color:white;
}

.header{
text-align:center;
font-size:40px;
color:#00eaff;
margin:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr 1fr 1fr;
gap:20px;
padding:20px;
}

.card{
background:#0f1c35;
padding:20px;
border-radius:10px;
text-align:center;
}

.buy{color:#00ff88}
.sell{color:#ff3b3b}
.wait{color:gray}

.history{
position:fixed;
right:0;
top:0;
width:250px;
height:100%;
background:#09142a;
overflow:auto;
padding:20px;
}

</style>
</head>

<body>

<div class="header">
BTC / USDT SIGNAL ENGINE
</div>

<div class="grid">

<div class="card">
<h2>EMA</h2>
<div id="ema">WAIT</div>
</div>

<div class="card">
<h2>RSI</h2>
<div id="rsi">WAIT</div>
</div>

<div class="card">
<h2>MACD</h2>
<div id="macd">WAIT</div>
</div>

<div class="card">
<h2>AI SIGNAL</h2>
<div id="ai">WAIT</div>
</div>

</div>

<div class="history">
<h3>Signal History</h3>
<div id="history"></div>
</div>

<script>

function setSignal(el,signal){

el.innerText=signal

el.className=""

if(signal=="BUY") el.classList.add("buy")
else if(signal=="SELL") el.classList.add("sell")
else el.classList.add("wait")

}

async function loadSignals(){

let r=await fetch("/signals")
let d=await r.json()

setSignal(ema,d.signals.ema)
setSignal(rsi,d.signals.rsi)
setSignal(macd,d.signals.macd)
setSignal(ai,d.signals.ai)

}

async function loadHistory(){

let r=await fetch("/history")
let h=await r.json()

history.innerHTML=""

h.reverse().forEach(x=>{

history.innerHTML+=`
<div>${x.time} : ${x.signal}</div>
`

})

}

setInterval(loadSignals,5000)
setInterval(loadHistory,5000)

loadSignals()
loadHistory()

</script>

</body>
</html>
