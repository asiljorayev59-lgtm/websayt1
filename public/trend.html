<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Trend Strategy</title>

<style>
body{background:#020617;color:white;font-family:Segoe UI;margin:0}
.container{padding:20px}
.card{background:#111;padding:15px;margin-bottom:10px;border-radius:10px}
.buy{color:#22c55e}
.sell{color:#ef4444}
</style>
</head>

<body>

<div class="container">

<h2>📈 Trend Strategy</h2>

<div class="card">
<h3>Signal</h3>
<p id="signal">...</p>
</div>

<div class="card">
<h3>Entry / Exit</h3>
<p id="entry"></p>
<p id="tp"></p>
<p id="sl"></p>
</div>

<div class="card">
<h3>Chart</h3>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=OANDA:XAUUSD" width="100%" height="400"></iframe>
</div>

<div class="card">
<h3>History</h3>
<ul id="history"></ul>
</div>

</div>

<script>

async function load(){

let s = await fetch("/signal").then(r=>r.json())

signal.innerText = s.trend_m15
entry.innerText = "Entry: "+(2300 + Math.random()*50).toFixed(2)
tp.innerText = "TP: +50"
sl.innerText = "SL: -30"

// SAVE HISTORY
await fetch("/save",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
signal:s.trend_m15,
time:new Date()
})
})

// LOAD HISTORY
let h = await fetch("/history").then(r=>r.json())

history.innerHTML = h.slice(0,10)
.map(x=>`<li>${x.signal} - ${x.time}</li>`).join("")

}

setInterval(load,10000)
load()

</script>

</body>
</html>
