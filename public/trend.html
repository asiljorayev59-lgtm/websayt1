<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Trend Strategy PRO</title>

<style>
body{background:#020617;color:white;font-family:Segoe UI;margin:0}
.container{padding:20px}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
.card{background:#111;padding:15px;border-radius:10px}
.buy{color:#22c55e}
.sell{color:#ef4444}
.title{text-align:center;color:#FFD700;font-size:28px}
</style>
</head>

<body>

<div class="container">

<div class="title">💰 GOLD: <span id="price"></span></div>

<div class="grid">

<div class="card">
<h3>H1</h3>
<p id="h1"></p>
<p>EMA: <span id="h1ema"></span></p>
<p>RSI: <span id="h1rsi"></span></p>
<p id="h1entry"></p>
<p id="h1tp"></p>
<p id="h1sl"></p>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=OANDA:XAUUSD&interval=60&theme=dark" width="100%" height="200"></iframe>
<ul id="h1History"></ul>
<p id="h1Stats"></p>
</div>

<div class="card">
<h3>H4</h3>
<p id="h4"></p>
<p>EMA: <span id="h4ema"></span></p>
<p>RSI: <span id="h4rsi"></span></p>
<p id="h4entry"></p>
<p id="h4tp"></p>
<p id="h4sl"></p>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=OANDA:XAUUSD&interval=240&theme=dark" width="100%" height="200"></iframe>
<ul id="h4History"></ul>
<p id="h4Stats"></p>
</div>

<div class="card">
<h3>D1</h3>
<p id="d1"></p>
<p>EMA: <span id="d1ema"></span></p>
<p>RSI: <span id="d1rsi"></span></p>
<p id="d1entry"></p>
<p id="d1tp"></p>
<p id="d1sl"></p>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=OANDA:XAUUSD&interval=D&theme=dark" width="100%" height="200"></iframe>
<ul id="d1History"></ul>
<p id="d1Stats"></p>
</div>

</div>
</div>

<script>

async function load(){

let s = await fetch("/signal").then(r=>r.json())

price.innerText = s.price + " USD"

function set(el,val){
el.innerText = val
el.className = val=="BUY"?"buy":val=="SELL"?"sell":""
}

set(h1,s.h1)
set(h4,s.h4)
set(d1,s.d1)

h1ema.innerText=s.ema50
h4ema.innerText=s.ema50
d1ema.innerText=s.ema50

h1rsi.innerText=s.rsi
h4rsi.innerText=s.rsi
d1rsi.innerText=s.rsi

function trade(sig,e,tp,sl){
let p=s.price
e.innerText="Entry "+p
if(sig=="BUY"){
tp.innerText="TP "+(p+50)
sl.innerText="SL "+(p-30)
}else{
tp.innerText="TP "+(p-50)
sl.innerText="SL "+(p+30)
}
}

trade(s.h1,h1entry,h1tp,h1sl)
trade(s.h4,h4entry,h4tp,h4sl)
trade(s.d1,d1entry,d1tp,d1sl)

await fetch("/save",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({tf:"H1",signal:s.h1,entry:s.price})})
await fetch("/save",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({tf:"H4",signal:s.h4,entry:s.price})})
await fetch("/save",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({tf:"D1",signal:s.d1,entry:s.price})})

let h = await fetch("/history").then(r=>r.json())

function render(tf){
return h.filter(x=>x.tf==tf).slice(0,5)
.map(x=>`<li>${x.signal} ${x.result=="WIN"?"✔":"❌"}</li>`).join("")
}

h1History.innerHTML=render("H1")
h4History.innerHTML=render("H4")
d1History.innerHTML=render("D1")

let stats = await fetch("/stats").then(r=>r.json())

h1Stats.innerText=`✔ ${stats.H1.win} ❌ ${stats.H1.loss}`
h4Stats.innerText=`✔ ${stats.H4.win} ❌ ${stats.H4.loss}`
d1Stats.innerText=`✔ ${stats.D1.win} ❌ ${stats.D1.loss}`

}

setInterval(load,60000)
load()

</script>

</body>
</html>
