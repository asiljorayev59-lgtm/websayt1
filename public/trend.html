<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>PRO GOLD AI ULTIMATE v2.0 - Trend + SMC</title>
<style>
body {
    background: linear-gradient(135deg, #020617, #020c1b);
    color: white;
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    padding: 0;
}
.container {
    max-width: 1300px;
    margin: auto;
    padding: 20px;
}
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 25px;
}
.card {
    background: #0f172a;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 0 20px rgba(0,0,0,0.6);
    transition: 0.3s;
}
.card:hover { transform: scale(1.03); }
h3 { color: #38bdf8; margin-top: 0; font-size: 1.4em; }
.buy { color: #22c55e; font-weight: bold; font-size: 1.3em; }
.sell { color: #ef4444; font-weight: bold; font-size: 1.3em; }
.info p { margin: 8px 0; font-size: 14px; }
.info span { font-weight: bold; color: #a5b4fc; }
.stat { margin-top: 15px; font-size: 14px; color: #94a3b8; }
.chart { margin-top: 15px; border-radius: 8px; overflow: hidden; }
ul { padding-left: 20px; font-size: 13px; }
li { margin: 4px 0; }
</style>
</head>
<body>
<div class="container">
    <h2>💰 XAUUSD (GOLD): <span id="price" style="font-size:1.5em;color:#fbbf24;"></span></h2>
    
    <div class="grid">
        <!-- H1 -->
        <div class="card">
            <h3>⚡ H1 Trend Filter</h3>
            <p id="h1" style="font-size:1.4em;"></p>
            <div id="chart_h1" class="chart"></div>
            <ul id="h1History"></ul>
            <p id="h1Stats" class="stat"></p>
        </div>

        <!-- H4 MAIN -->
        <div class="card">
            <h3>🔥 H4 (MAIN STRATEGY) - Trend + SMC</h3>
            <p id="h4" style="font-size:1.6em;"></p>
            <div class="info">
                <p>BOS: <span id="bos4"></span></p>
                <p>Order Block: <span id="ob"></span></p>
                <p>Liquidity High: <span id="res"></span></p>
                <p>Liquidity Low: <span id="sup"></span></p>
                <p><strong>Entry:</strong> <span id="entry"></span></p>
                <p><strong>TP1 / TP2:</strong> <span id="tp"></span></p>
                <p><strong>SL:</strong> <span id="sl"></span></p>
            </div>
            <div id="chart_h4" class="chart"></div>
            <ul id="h4History"></ul>
            <p id="h4Stats" class="stat"></p>
        </div>

        <!-- D1 -->
        <div class="card">
            <h3>📊 D1 Higher Bias</h3>
            <p id="d1" style="font-size:1.4em;"></p>
            <div id="chart_d1" class="chart"></div>
            <ul id="d1History"></ul>
            <p id="d1Stats" class="stat"></p>
        </div>
    </div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
function loadCharts() {
    new TradingView.widget({ container_id: "chart_h1", width: "100%", height: 220, symbol: "OANDA:XAUUSD", interval: "60", theme: "dark" });
    new TradingView.widget({ container_id: "chart_h4", width: "100%", height: 260, symbol: "OANDA:XAUUSD", interval: "240", theme: "dark" });
    new TradingView.widget({ container_id: "chart_d1", width: "100%", height: 220, symbol: "OANDA:XAUUSD", interval: "D", theme: "dark" });
}

async function load() {
    try {
        const s = await fetch("/signal").then(r => r.json());
        
        document.getElementById("price").innerText = parseFloat(s.price).toFixed(2) + " USD";

        function setSignal(elId, signal) {
            const el = document.getElementById(elId);
            el.innerText = signal || "NEUTRAL";
            el.className = signal === "BUY" ? "buy" : signal === "SELL" ? "sell" : "";
        }

        setSignal("h1", s.h1);
        setSignal("h4", s.h4);
        setSignal("d1", s.d1);

        // SMC + Trend ma'lumotlari
        document.getElementById("bos4").innerText = s.bos_h4 || "—";
        document.getElementById("ob").innerText = s.ob_h4 || "—";
        document.getElementById("res").innerText = s.resistance || "—";
        document.getElementById("sup").innerText = s.support || "—";
        document.getElementById("entry").innerText = s.entry ? parseFloat(s.entry).toFixed(2) : "—";
        document.getElementById("tp").innerText = s.tp ? parseFloat(s.tp).toFixed(2) : "—";
        document.getElementById("sl").innerText = s.sl ? parseFloat(s.sl).toFixed(2) : "—";

        // Save signals (backend kerak)
        await fetch("/save", { method: "POST", headers: {"Content-Type": "application/json"}, 
            body: JSON.stringify({tf: "H1", signal: s.h1, entry: s.price}) });
        await fetch("/save", { method: "POST", headers: {"Content-Type": "application/json"}, 
            body: JSON.stringify({tf: "H4", signal: s.h4, entry: s.price}) });
        await fetch("/save", { method: "POST", headers: {"Content-Type": "application/json"}, 
            body: JSON.stringify({tf: "D1", signal: s.d1, entry: s.price}) });

        // History
        const h = await fetch("/history").then(r => r.json());
        function renderHistory(tf) {
            return h.filter(x => x.tf === tf).slice(0, 6)
                .map(x => `<li>${x.tf} ${x.signal} → ${x.result || "?"} ${x.result === "WIN" ? "✔️" : x.result === "LOSS" ? "❌" : ""}</li>`).join("");
        }
        document.getElementById("h1History").innerHTML = renderHistory("H1");
        document.getElementById("h4History").innerHTML = renderHistory("H4");
        document.getElementById("d1History").innerHTML = renderHistory("D1");

        // Stats
        const stats = await fetch("/stats").then(r => r.json());
        document.getElementById("h1Stats").innerText = `WIN: ${stats.H1?.win || 0} | LOSS: ${stats.H1?.loss || 0}`;
        document.getElementById("h4Stats").innerText = `WIN: ${stats.H4?.win || 0} | LOSS: ${stats.H4?.loss || 0}`;
        document.getElementById("d1Stats").innerText = `WIN: ${stats.D1?.win || 0} | LOSS: ${stats.D1?.loss || 0}`;

    } catch(e) {
        console.error("Signal yuklashda xatolik:", e);
    }
}

loadCharts();
setInterval(load, 60000); // har 60 sekundda yangilash
load();
</script>
</body>
</html>
