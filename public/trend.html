<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Trend Strategy PRO</title>

<style>
body{background:#020617;color:white;font-family:Segoe UI}
.container{padding:20px}
.card{background:#111;padding:15px;margin:10px;border-radius:10px}
.buy{color:#22c55e}
.sell{color:#ef4444}
</style>
</head>

<body>

<div class="container">

<h2>📊 Multi Timeframe Strategy</h2>

<div class="card">
<h3>H1</h3>
<p id="h1"></p>
<ul id="h1History"></ul>
<p id="h1Stats"></p>
</div>

<div class="card">
<h3>H4</h3>
<p id="h4"></p>
<ul id="h4History"></ul>
<p id="h4Stats"></p>
</div>

<div class="card">
<h3>D1</h3>
<p id="d1"></p>
<ul id="d1History"></ul>
<p id="d1Stats"></p>
</div>

</div>

<script>

async function load(){

let s = await fetch("/signal").then(r=>r.json())

h1.innerText = s.h1
h4.innerText = s.h4
d1.innerText = s.d1

let price = s.price ?? 2300

// SAVE SIGNALS
await fetch("/save",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({tf:"H1",signal:s.h1,entry:price})})
await fetch("/save",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({tf:"H4",signal:s.h4,entry:price})})
await fetch("/save",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({tf:"D1",signal:s.d1,entry:price})})

// HISTORY
let h = await fetch("/history").then(r=>r.json())

function render(tf,el){
  return h.filter(x=>x.tf==tf)
  .slice(0,5)
  .map(x=>`<li>${x.signal} ${x.result=="WIN"?"✔️":"❌"}</li>`).join("")
}

h1History.innerHTML = render("H1")
h4History.innerHTML = render("H4")
d1History.innerHTML = render("D1")

// STATS
let stats = await fetch("/stats").then(r=>r.json())

h1Stats.innerText = `✔ ${stats.H1.win} ❌ ${stats.H1.loss}`
h4Stats.innerText = `✔ ${stats.H4.win} ❌ ${stats.H4.loss}`
d1Stats.innerText = `✔ ${stats.D1.win} ❌ ${stats.D1.loss}`

}

setInterval(load,60000)
load()

</script>

</body>
</html>
