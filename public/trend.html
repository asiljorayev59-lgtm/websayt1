<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Trend Strategy PRO</title>

<style>
body{
background:#020617;
color:white;
font-family:Segoe UI;
margin:0;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.title{
font-size:28px;
color:#FFD700;
margin-bottom:15px;
text-shadow:0 0 10px #FFD700;
}

.card{
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

.buy{color:#22c55e;font-weight:bold;}
.sell{color:#ef4444;font-weight:bold;}
.wait{color:#aaa;}

.box{
background:#111;
padding:10px;
border-radius:8px;
margin-top:5px;
}

</style>
</head>

<body>

<div class="container">

<div class="title">📈 Trend Strategy PRO</div>

<!-- SIGNAL -->
<div class="card">
<h3>Signal</h3>
<p id="signal">Loading...</p>
</div>

<!-- ANALYSIS -->
<div class="card">
<h3>📊 Analysis</h3>
<p>EMA50: <span id="ema50">-</span></p>
<p>EMA200: <span id="ema200">-</span></p>
<p>RSI: <span id="rsi">-</span></p>
</div>

<!-- ENTRY / EXIT -->
<div class="card">
<h3>Entry / Exit</h3>
<p id="entry"></p>
<p id="tp"></p>
<p id="sl"></p>
</div>

<!-- TRADE SETUP -->
<div class="card">
<h3>🎯 Trade Setup</h3>
<p id="entryLine"></p>
<p id="tpLine"></p>
<p id="slLine"></p>
</div>

<!-- CHART -->
<div class="card">
<h3>📈 Chart</h3>
<iframe 
src="https://s.tradingview.com/widgetembed/?symbol=OANDA:XAUUSD&interval=60&theme=dark" 
width="100%" 
height="400"
style="border:none;">
</iframe>
</div>

<!-- HISTORY -->
<div class="card">
<h3>📜 History</h3>
<ul id="history"></ul>
</div>

</div>

<script>

async function load(){

  let s = await fetch("/signal").then(r=>r.json())

  // ELEMENTLAR
  const signalEl = document.getElementById("signal")
  const ema50El = document.getElementById("ema50")
  const ema200El = document.getElementById("ema200")
  const rsiEl = document.getElementById("rsi")
  const entryEl = document.getElementById("entry")
  const tpEl = document.getElementById("tp")
  const slEl = document.getElementById("sl")
  const historyEl = document.getElementById("history")

  const entryLine = document.getElementById("entryLine")
  const tpLine = document.getElementById("tpLine")
  const slLine = document.getElementById("slLine")

  // SIGNAL
  let sig = s.trend_h1 || "WAIT"

  signalEl.innerText = sig
  signalEl.className = ""

  if(sig == "BUY") signalEl.classList.add("buy")
  else if(sig == "SELL") signalEl.classList.add("sell")
  else signalEl.classList.add("wait")

  // ANALYSIS
  ema50El.innerText = s.ema50 ?? "-"
  ema200El.innerText = s.ema200 ?? "-"
  rsiEl.innerText = s.rsi ?? "-"

  // ENTRY LOGIC
  let price = s.price ?? 2300

  entryEl.innerText = "Entry: " + price

  if(sig == "BUY"){
    tpEl.innerText = "TP: " + (price + 50).toFixed(2)
    slEl.innerText = "SL: " + (price - 30).toFixed(2)
  } 
  else if(sig == "SELL"){
    tpEl.innerText = "TP: " + (price - 50).toFixed(2)
    slEl.innerText = "SL: " + (price + 30).toFixed(2)
  } 
  else{
    tpEl.innerText = "-"
    slEl.innerText = "-"
  }

  // TRADE SETUP TEXT
  entryLine.innerText = "ENTRY → " + price
  tpLine.innerText = tpEl.innerText
  slLine.innerText = slEl.innerText

  // SAVE HISTORY
  await fetch("/save",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      signal:sig,
      time:new Date().toLocaleTimeString()
    })
  })

  // LOAD HISTORY
  let h = await fetch("/history").then(r=>r.json())

  historyEl.innerHTML = h.slice(0,10)
    .map(x=>`<li>${x.signal} - ${x.time}</li>`)
    .join("")
}

// LOOP
setInterval(load,10000)
load()

</script>

</body>
</html>
