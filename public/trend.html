<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>PRO GOLD AI</title>

<style>
body{
background:#020617;
color:white;
font-family:Segoe UI;
margin:0;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:#0f172a;
padding:15px;
border-radius:12px;
margin-bottom:15px;
position:relative;
}

.buy{color:#22c55e}
.sell{color:#ef4444}

canvas{
position:absolute;
top:0;
left:0;
pointer-events:none;
}
</style>
</head>

<body>

<div class="container">

<h2>💰 GOLD: <span id="price"></span></h2>

<div class="card">

<h3>📊 H4 SIGNAL</h3>
<p id="signal"></p>

<p id="entryText"></p>
<p id="tpText"></p>
<p id="slText"></p>

<!-- CHART -->
<div style="position:relative">

<iframe id="chart"
src="https://s.tradingview.com/widgetembed/?symbol=OANDA:XAUUSD&interval=240&theme=dark"
width="100%" height="400"></iframe>

<!-- 🔥 CHIZIQ -->
<canvas id="overlay"></canvas>

</div>

</div>

<div class="card">
<h3>📜 HISTORY</h3>
<ul id="history"></ul>
</div>

</div>

<script>

async function load(){

let s = await fetch("/signal").then(r=>r.json())

price.innerText = s.price + " USD"

let sig = s.h4

signal.innerText = sig
signal.className = sig=="BUY"?"buy":"sell"

// ENTRY
let entry = s.price
let tp, sl

if(sig=="BUY"){
tp = entry + 50
sl = entry - 30
}else{
tp = entry - 50
sl = entry + 30
}

entryText.innerText = "ENTRY: "+entry
tpText.innerText = "TP: "+tp
slText.innerText = "SL: "+sl

// 🔥 HISTORY SAVE (serverga yoziladi)
await fetch("/save",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
tf:"H4",
signal:sig,
entry:entry
})
})

// 🔥 HISTORY LOAD
let h = await fetch("/history").then(r=>r.json())

history.innerHTML = h.slice(0,10)
.map(x=>`<li>${x.signal} ${x.result=="WIN"?"✔️":"❌"}</li>`).join("")

// 🔥 CHIZIQ CHIZISH
drawLines(entry,tp,sl)

}

function drawLines(entry,tp,sl){

const canvas = document.getElementById("overlay")
const ctx = canvas.getContext("2d")

const chart = document.getElementById("chart")

canvas.width = chart.offsetWidth
canvas.height = chart.offsetHeight

ctx.clearRect(0,0,canvas.width,canvas.height)

// FAKE scale (vizual uchun)
function map(price){
return canvas.height - (price % 100) * 3
}

// ENTRY
ctx.strokeStyle = "yellow"
ctx.beginPath()
ctx.moveTo(0,map(entry))
ctx.lineTo(canvas.width,map(entry))
ctx.stroke()

// TP
ctx.strokeStyle = "lime"
ctx.beginPath()
ctx.moveTo(0,map(tp))
ctx.lineTo(canvas.width,map(tp))
ctx.stroke()

// SL
ctx.strokeStyle = "red"
ctx.beginPath()
ctx.moveTo(0,map(sl))
ctx.lineTo(canvas.width,map(sl))
ctx.stroke()

}

setInterval(load,10000)
load()

</script>

</body>
</html>
