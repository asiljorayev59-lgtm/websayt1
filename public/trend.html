<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>PRO GOLD AI ULTIMATE</title>

<style>
body{
background:linear-gradient(135deg,#020617,#020c1b);
color:white;
font-family:Segoe UI;
margin:0;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:20px;
}

.card{
background:#0f172a;
padding:15px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,0.5);
transition:0.3s;
}

.card:hover{transform:scale(1.02)}

h3{color:#38bdf8;margin-top:0}

.buy{color:#22c55e;font-weight:bold}
.sell{color:#ef4444;font-weight:bold}

.info{
font-size:13px;
color:#94a3b8;
}

.stat{margin-top:10px}

.chart{margin-top:10px}
</style>
</head>

<body>

<div class="container">

<h2>💰 GOLD: <span id="price"></span></h2>

<div class="grid">

<!-- H1 -->
<div class="card">
<h3>⚡ H1</h3>
<p id="h1"></p>

<div id="chart_h1" class="chart"></div>

<ul id="h1History"></ul>
<p id="h1Stats" class="stat"></p>
</div>

<!-- H4 -->
<div class="card">
<h3>🔥 H4 (MAIN)</h3>

<p id="h4"></p>

<div class="info">
<p>BOS: <span id="bos4"></span></p>
<p>Order Block: <span id="ob"></span></p>
<p>Liquidity High: <span id="res"></span></p>
<p>Liquidity Low: <span id="sup"></span></p>

<p>Entry: <span id="entry"></span></p>
<p>TP: <span id="tp"></span></p>
<p>SL: <span id="sl"></span></p>
</div>

<div id="chart_h4" class="chart"></div>

<ul id="h4History"></ul>
<p id="h4Stats" class="stat"></p>
</div>

<!-- D1 -->
<div class="card">
<h3>📊 D1</h3>
<p id="d1"></p>

<div id="chart_d1" class="chart"></div>

<ul id="d1History"></ul>
<p id="d1Stats" class="stat"></p>
</div>

</div>
</div>

<!-- TradingView -->
<script src="https://s3.tradingview.com/tv.js"></script>

<script>

function loadCharts(){

new TradingView.widget({
  container_id:"chart_h1",
  width:"100%",
  height:200,
  symbol:"OANDA:XAUUSD",
  interval:"60",
  theme:"dark"
})

new TradingView.widget({
  container_id:"chart_h4",
  width:"100%",
  height:200,
  symbol:"OANDA:XAUUSD",
  interval:"240",
  theme:"dark"
})

new TradingView.widget({
  container_id:"chart_d1",
  width:"100%",
  height:200,
  symbol:"OANDA:XAUUSD",
  interval:"D",
  theme:"dark"
})

}

async function load(){

let s = await fetch("/signal").then(r=>r.json())

price.innerText = s.price + " USD"

function set(el,val){
el.innerText = val
el.className = val=="BUY"?"buy":val=="SELL"?"sell":""
}

set(h1,s.h1)
set(h4,s.h4)
set(d1,s.d1)

// 🔥 SMC DATA
bos4.innerText = s.bos_h4
ob.innerText = s.ob_h4
res.innerText = s.resistance
sup.innerText = s.support

// 🔥 ENTRY SYSTEM
entry.innerText = s.entry
tp.innerText = s.tp
sl.innerText = s.sl

// SAVE
await fetch("/save",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({tf:"H1",signal:s.h1,entry:s.price})})
await fetch("/save",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({tf:"H4",signal:s.h4,entry:s.price})})
await fetch("/save",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({tf:"D1",signal:s.d1,entry:s.price})})

// HISTORY
let h = await fetch("/history").then(r=>r.json())

function render(tf){
return h.filter(x=>x.tf==tf).slice(0,5)
.map(x=>`<li>${x.signal} ${x.result=="WIN"?"✔️":"❌"}</li>`).join("")
}

h1History.innerHTML = render("H1")
h4History.innerHTML = render("H4")
d1History.innerHTML = render("D1")

// STATS
let stats = await fetch("/stats").then(r=>r.json())

h1Stats.innerText=`✔ ${stats.H1.win} | ❌ ${stats.H1.loss}`
h4Stats.innerText=`✔ ${stats.H4.win} | ❌ ${stats.H4.loss}`
d1Stats.innerText=`✔ ${stats.D1.win} | ❌ ${stats.D1.loss}`

}

loadCharts()
setInterval(load,60000)
load()

</script>

</body>
</html>
