<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Trend Strategy PRO</title>

<style>
body{background:#020617;color:white;font-family:Segoe UI;margin:0}
.container{max-width:1100px;margin:auto;padding:20px}
.card{background:#111;padding:15px;margin-bottom:10px;border-radius:10px}
.buy{color:#22c55e}
.sell{color:#ef4444}
.wait{color:#aaa}
</style>
</head>

<body>

<div class="container">

<h2>📈 Trend Strategy (H1 / H4 / D1)</h2>

<div class="card">
<h3>Signal</h3>
<p id="signal"></p>
</div>

<div class="card">
<h3>📊 Analysis</h3>
<p>EMA50: <span id="ema50"></span></p>
<p>EMA200: <span id="ema200"></span></p>
<p>RSI: <span id="rsi"></span></p>
</div>

<div class="card">
<h3>Entry / Exit</h3>
<p id="entry"></p>
<p id="tp"></p>
<p id="sl"></p>
</div>

<div class="card">
<h3>🎯 Trade Setup</h3>
<p id="entryLine"></p>
<p id="tpLine"></p>
<p id="slLine"></p>
</div>

<div class="card">
<h3>📈 Chart</h3>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=OANDA:XAUUSD" width="100%" height="400"></iframe>
</div>

<div class="card">
<h3>📜 History</h3>
<ul id="history"></ul>
</div>

<div class="card">
<h3>📊 Bugungi natija</h3>
<p id="stats"></p>
</div>

</div>

<script>

async function load(){

let s = await fetch("/signal").then(r=>r.json())

const signalEl = document.getElementById("signal")
const ema50El = document.getElementById("ema50")
const ema200El = document.getElementById("ema200")
const rsiEl = document.getElementById("rsi")
const entryEl = document.getElementById("entry")
const tpEl = document.getElementById("tp")
const slEl = document.getElementById("sl")
const historyEl = document.getElementById("history")
const statsEl = document.getElementById("stats")

const entryLine = document.getElementById("entryLine")
const tpLine = document.getElementById("tpLine")
const slLine = document.getElementById("slLine")

let sig = s.trend_h1 || "WAIT"

signalEl.innerText = sig
signalEl.className = sig=="BUY"?"buy":sig=="SELL"?"sell":"wait"

ema50El.innerText = s.ema50
ema200El.innerText = s.ema200
rsiEl.innerText = s.rsi

let price = s.price ?? 2300

entryEl.innerText = "Entry: "+price

if(sig=="BUY"){
tpEl.innerText = "TP: "+(price+50)
slEl.innerText = "SL: "+(price-30)
}
else if(sig=="SELL"){
tpEl.innerText = "TP: "+(price-50)
slEl.innerText = "SL: "+(price+30)
}
else{
tpEl.innerText="-"
slEl.innerText="-"
}

entryLine.innerText = "ENTRY → "+price
tpLine.innerText = tpEl.innerText
slLine.innerText = slEl.innerText

// SAVE
await fetch("/save",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
signal:sig,
entry:price,
time:new Date().toLocaleTimeString(),
result:"WAIT"
})
})

// CHECK RESULT
setTimeout(async ()=>{
await fetch("/check",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({price:price+Math.random()*20})
})
},60000)

// LOAD HISTORY
let h = await fetch("/history").then(r=>r.json())

historyEl.innerHTML = h.slice(0,10)
.map(x=>`<li>
${x.signal} - ${x.time} 
${x.result=="WIN"?"✔️":"❌"}
</li>`).join("")

// STATS
let today = new Date().toDateString()

let todaySignals = h.filter(x=> new Date().toDateString()==today)

let win = todaySignals.filter(x=>x.result=="WIN").length
let loss = todaySignals.filter(x=>x.result=="LOSS").length

statsEl.innerText = `✔️ ${win} ta to‘g‘ri | ❌ ${loss} ta xato`

}

setInterval(load,10000)
load()

</script>

</body>
</html>
