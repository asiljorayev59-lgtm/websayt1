<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Trend Strategy</title>

<style>
body{background:#020617;color:white;font-family:Segoe UI;margin:0}
.container{padding:20px}
.card{background:#111;padding:15px;margin-bottom:10px;border-radius:10px}
.buy{color:#22c55e}
.sell{color:#ef4444}
.wait{color:gray}
</style>
</head>

<body>

<div class="container">

<h2>📈 Trend Strategy</h2>

<div class="card">
<h3>Signal</h3>
<p id="signal">...</p>
</div>

<div class="card">
<h3>Analysis</h3>
<p>EMA50: <span id="ema50">-</span></p>
<p>EMA200: <span id="ema200">-</span></p>
<p>RSI: <span id="rsi">-</span></p>
</div>

<div class="card">
<h3>Entry / Exit</h3>
<p id="entry"></p>
<p id="tp"></p>
<p id="sl"></p>
</div>

<!-- 🔥 YANGI QO‘SHILDI -->
<div class="card">
<h3>🎯 Trade Setup</h3>
<p id="entryLine"></p>
<p id="tpLine"></p>
<p id="slLine"></p>
</div>

<div class="card">
<h3>Chart</h3>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=OANDA:XAUUSD" width="100%" height="400"></iframe>
</div>

<div class="card">
<h3>History</h3>
<ul id="history"></ul>
</div>

</div>

<script>

async function load(){

  let s = await fetch("/signal").then(r=>r.json())

  const signalEl = document.getElementById("signal")
  const ema50El = document.getElementById("ema50")
  const ema200El = document.getElementById("ema200")
  const rsiEl = document.getElementById("rsi")
  const entryEl = document.getElementById("entry")
  const tpEl = document.getElementById("tp")
  const slEl = document.getElementById("sl")
  const historyEl = document.getElementById("history")

  const entryLine = document.getElementById("entryLine")
  const tpLine = document.getElementById("tpLine")
  const slLine = document.getElementById("slLine")

  let sig = s.trend_h1 || "WAIT"

  // SIGNAL
  signalEl.innerText = sig
  signalEl.className = ""

  if(sig == "BUY") signalEl.classList.add("buy")
  else if(sig == "SELL") signalEl.classList.add("sell")
  else signalEl.classList.add("wait")

  // ANALYSIS
  ema50El.innerText = s.ema50 ?? "-"
  ema200El.innerText = s.ema200 ?? "-"
  rsiEl.innerText = s.rsi ?? "-"

  // ENTRY
  let price = s.price ?? 2300

  entryEl.innerText = "Entry: " + price

  let tp, sl

  if(sig == "BUY"){
    tp = price + 50
    sl = price - 30
  } else if(sig == "SELL"){
    tp = price - 50
    sl = price + 30
  }

  if(tp && sl){
    tpEl.innerText = "TP: " + tp.toFixed(2)
    slEl.innerText = "SL: " + sl.toFixed(2)

    // 🎯 VISUAL LINES
    entryLine.innerText = "🟡 Entry Zone: " + price
    tpLine.innerText = "🟢 Take Profit: " + tp.toFixed(2)
    slLine.innerText = "🔴 Stop Loss: " + sl.toFixed(2)
  } else {
    tpEl.innerText = "-"
    slEl.innerText = "-"
  }

  // SAVE HISTORY
  await fetch("/save",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      signal:sig,
      time:new Date().toLocaleTimeString()
    })
  })

  // LOAD HISTORY
  let h = await fetch("/history").then(r=>r.json())

  historyEl.innerHTML = h.slice(0,10)
    .map(x=>`<li>${x.signal} - ${x.time}</li>`)
    .join("")

}

// LOOP
setInterval(load,10000)
load()

</script>
</body>
</html>
