<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>🔥 Signal Strength - GOLD AI PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    :root { --gold: #fbbf24; --green: #22c55e; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        background: radial-gradient(circle at 50% 30%, #1e3a5f 0%, #020617 70%);
        color: white;
        font-family: 'Segoe UI', sans-serif;
        min-height: 100vh;
    }
    .header { background:rgba(15,23,42,0.92); backdrop-filter:blur(20px); padding:18px 20px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; }
    .main { padding:30px 20px; }
    h1 { text-align:center; font-size:2.6em; color:var(--gold); margin-bottom:10px; }
    
    .strength-card {
        background:#0f172a;
        border-radius:28px;
        padding:35px 25px;
        text-align:center;
        margin:30px 0;
    }
    .strength-value {
        font-size:4.5em;
        font-weight:900;
        color:var(--gold);
        margin:15px 0;
    }
    .strength-bar {
        height:14px;
        background:#334155;
        border-radius:9999px;
        overflow:hidden;
        margin:20px 0;
    }
    .strength-fill {
        height:100%;
        background:linear-gradient(90deg, #22c55e, #fbbf24);
    }
</style>
</head>
<body>

<div class="header">
    <div style="font-size:1.8em; font-weight:700; color:var(--gold);">🔥 Signal Strength</div>
    <div id="time" style="color:#94a3b8;"></div>
</div>

<div class="main">
    <h1>AI Signal Kuchliligi</h1>
    
    <div class="strength-card">
        <p style="font-size:1.4em; color:#22c55e;">Hozirgi Signal</p>
        <div style="font-size:2.8em; font-weight:800; margin:15px 0;" id="signalText">BUY</div>
        <div class="strength-value" id="strengthValue">84%</div>
        <div class="strength-bar">
            <div class="strength-fill" id="strengthFill" style="width:84%;"></div>
        </div>
        <p style="color:#94a3b8; margin-top:20px;">
            Trend (30) + BOS (28) + RSI (18) + Volume (8) = <strong>84</strong>
        </p>
    </div>

    <div style="text-align:center; color:#94a3b8; font-size:1.1em;">
        80% dan yuqori — juda kuchli signal<br>
        60-79% — o‘rtacha kuchli<br>
        60% dan past — ehtiyot bo‘ling
    </div>
</div>

<script>
function updateTime() {
    const now = new Date();
    document.getElementById("time").textContent = now.toLocaleTimeString('uz-UZ', {hour:'2-digit', minute:'2-digit'});
}
setInterval(updateTime, 10000);
updateTime();

// Simulyatsiya
setInterval(() => {
    const strength = Math.floor(Math.random() * 25) + 68;
    document.getElementById("strengthValue").textContent = strength + "%";
    document.getElementById("strengthFill").style.width = strength + "%";
    document.getElementById("signalText").textContent = strength > 75 ? "BUY" : "SELL";
    document.getElementById("signalText").style.color = strength > 75 ? "#22c55e" : "#ef4444";
}, 7000);
</script>
</body>
</html>
